<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPX Lat/Lon Extractor</title>
    <link rel="stylesheet" href="main.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        textarea {
            width: 100%;
            height: 400px;
            font-family: monospace;
            background: var(--bg-primary-medium);
            color: var(--text-primary);
            padding: 0.25rem;
            box-sizing:border-box;
            border: none;
            outline: none;
            resize: none;
        }

        textarea::placeholder {
            color: var(--text-primary);   
        }

        div.form-group {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            position: relative;
            box-sizing:border-box;
            border-radius: 0.25rem;
            border: 2px solid var(--bg-primary-light);
        }
        input[type="file"]::file-selector-button {
            background: var(--bg-primary-light);
            color: var(--text-primary);
            border: none;
            padding: 0.5rem;
            cursor: pointer;
        }

        button#copyBtn {
            padding: 0.5rem;
            background: var(--bg-primary-light);
            color: var(--text-primary);
            border: none;
            cursor: pointer;
        }

        select {
            padding: 0.5rem;
            background: var(--bg-primary-light);
            color: var(--text-primary);
            border: none;
            cursor: pointer;
        }

        div#google-maps-options {
            background: var(--bg-primary-medium);
            color: var(--text-primary);
            border-bottom: 2px solid var(--bg-primary-light);
            box-sizing: border-box;
            padding: 0.5rem;
            font-size: 0.8rem;
            display: flex;
        }

        input[type="checkbox"] {
            accent-color: var(--bg-primary-light);
            margin-right: 0.25rem;
            vertical-align: middle;
        }

        label {
    display: inline-block;
    vertical-align: middle;
        }
    </style>
</head>
<body>
    <h2>GPX File Utility</h2>
    <p>
        This webpage tool remaps a <code>gpx</code> file exported from Roads by Porsche into a list of latitude and longitude pairs, which can be used
        <br>
        to create a route in <a href="https://www.google.com/maps/" target="_blank">Google Maps</a> or
        <a href="https://www.myrouteonline.com/" target="_blank">MyRoute</a> + <a href="https://www.waze.com/" target="_blank">Waze</a>.
    </p>

    <div class="form-group">

        <select name="Format" id="app">
            <option value="" selected>Select Format</option>

            <option value="myroutes">MyRoutes</option>
            <option value="google-maps">Google Maps</option>
        </select>

        <input type="file" id="fileInput" accept=".gpx,.xml" />

        <div id="google-maps-options" style="display: none;">
            <label for="google-maps-options:myLocation">
                <input type="checkbox" id="google-maps-options:myLocation" checked> My Location as first waypoint
            </label>
        </div>

        <textarea id="output" readonly placeholder="Lat/lon pairs will appear here..."></textarea>
        <button id="copyBtn">Copy to Clipboard</button>
    </div>
    <script>
        function createExport(file) {
            
            const format = document.getElementById("app").value;
            if (!format) return;

            const reader = new FileReader();

            switch (format) {
                case "myroutes":
                    document.getElementById("copyBtn").innerText = "Copy to Clipboard";
                    break;
                case "google-maps":
                    document.getElementById("copyBtn").innerText = "Open in Google Maps";
                    break;
            }

            reader.onload = function (e) {
                const text = e.target.result;

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "application/xml");

                const points = xmlDoc.getElementsByTagName("rtept");
                let output = [];

                const format = document.getElementById("app").value;
                if (format == "google-maps") {
                    output.push("https://www.google.com/maps/dir/");
                }

                const firstMyLocation = document.getElementById("google-maps-options:myLocation");
                if (format == "google-maps" && firstMyLocation.checked) {
                    output.push("My+Location/");
                }

                for (let i = 0; i < points.length; i++) {
                    const lat = points[i].getAttribute("lat");
                    const lon = points[i].getAttribute("lon");

                    if (lat && lon) {
                        const format = document.getElementById("app").value;

                        switch (format) {
                            case "myroutes":
                                output.push(`${lat} ${lon}`);
                                break;
                            case "google-maps":
                                output.push(`${lat},${lon}/`);
                                break;
                        }
                    }
                }

                document.getElementById("output").value =
                    output.length > 0
                        ? output.join("\n")
                        : "No track points found.";
            };

            reader.readAsText(file);
        };

        document.getElementById("fileInput").addEventListener("change", function (event) {
            const file = event.target.files[0];
            if (file) {
                createExport(file);
            }
        });

        document.getElementById("app").addEventListener("change", function () {
            const fileInput = document.getElementById("fileInput");
            if (fileInput.files.length > 0) {
                createExport(fileInput.files[0]);
            }

            const googleMapsOptions = document.getElementById("google-maps-options");
            if (this.value === "google-maps") {
                googleMapsOptions.style.display = "flex";
            } else {
                googleMapsOptions.style.display = "none";
            }
        });

        document.getElementById("copyBtn").addEventListener("click", async function () {

            const format = document.getElementById("app").value;
            if (!format) return;

            switch (format) {
                case "google-maps":
                    window.open(document.getElementById("output").value, "_blank");
                    break;
                default:
                    const text = document.getElementById("output").value;
                    if (!text) return;

                    await navigator.clipboard.writeText(text);
                    const status = document.getElementById("status");
                    status.textContent = "Copied!";
                    setTimeout(() => status.textContent = "", 2000);
                    break;
            }
        });
    </script>
</body>
</html>
