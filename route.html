<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPX Lat/Lon Extractor</title>
    <link rel="stylesheet" href="main.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        textarea {
            width: 100%;
            height: 400px;
            margin-top: 20px;
            font-family: monospace;
            background: var(--bg-primary-medium);
            color: var(--text-primary);
            padding: 0.25rem;
            border-radius: 0.25rem;
            border: 2px solid var(--bg-primary-light);
        }

        textarea::placeholder {
            color: var(--text-primary);   
        }

        div.form-group {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        input#fileInput {
            padding: 1.5rem 1rem;
            border-radius: 0.25rem;
            border: 2px solid var(--bg-primary-light);
        }

        input[type="file"]::file-selector-button {
            background: var(--bg-primary-light);
            color: var(--text-primary);
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Upload GPX File</h2>
    <p>
        This webpage tool remaps a <code>gpx</code> file exported from Roads by Porsche into a list of latitude and longitude pairs.
        <br>
        The output can be pasted into <a href="https://www.myrouteonline.com/user-guides/waze-route-planner" target="_blank">MyRoute</a>, and 
        ran through <a href="https://www.waze.com/" target="_blank">Waze</a> for a pleasurable drive.
    </p>

    <div class="form-group">
        <input type="file" id="fileInput" accept=".gpx,.xml" />
        <textarea id="output" readonly placeholder="Lat/lon pairs will appear here..."></textarea>
    </div>
    <script>
        document.getElementById("fileInput").addEventListener("change", function (event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (e) {
                const text = e.target.result;

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "application/xml");

                const points = xmlDoc.getElementsByTagName("rtept");
                let output = [];

                for (let i = 0; i < points.length; i++) {
                    const lat = points[i].getAttribute("lat");
                    const lon = points[i].getAttribute("lon");

                    if (lat && lon) {
                        output.push(`${lat} ${lon}`);
                    }
                }

                document.getElementById("output").value =
                    output.length > 0
                        ? output.join("\n")
                        : "No track points found.";
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
